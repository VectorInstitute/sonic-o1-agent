repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    - id: trailing-whitespace
    - id: check-ast
    - id: check-builtin-literals
    - id: check-docstring-first
    - id: check-executables-have-shebangs
    - id: debug-statements
    - id: end-of-file-fixer
    - id: mixed-line-ending
      args: [--fix=lf]
    - id: fix-byte-order-marker
    - id: check-merge-conflict
    - id: check-symlinks
    - id: detect-private-key
    - id: check-yaml
      args: [--unsafe]
    - id: check-toml

  - repo: local
    hooks:
    - id: uv-lock
      name: uv-lock
      entry: uv lock --check
      language: system
      pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 'v0.15.0'
    hooks:
    - id: ruff-check
      args: [--fix, --exit-non-zero-on-fix]
      types_or: [python, jupyter]
    - id: ruff-format
      types_or: [python, jupyter]

  - repo: local
    hooks:
    - id: mypy
      name: mypy
      entry: uv run mypy --config-file pyproject.toml
      language: system
      types: [python]
      exclude: "tests|src/sonic_o1_agent/api\\.py"

  - repo: https://github.com/crate-ci/typos
    rev: v1
    hooks:
      - id: typos
        args: []

  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
    - id: nbqa-ruff
      args: [--fix, --exit-non-zero-on-fix]

  - repo: local
    hooks:
    - id: doctest
      name: doctest
      entry: uv run python3 -m doctest -o NORMALIZE_WHITESPACE
      files: "^src/sonic_o1_agent/"
      exclude: "src/sonic_o1_agent/(demo|api\\.py)"
      types: [python]
      language: system

  - repo: local
    hooks:
    - id: pytest
      name: pytest
      entry: uv run pytest tests/unit
      language: system
      pass_filenames: false
      always_run: true

ci:
    autofix_commit_msg: |
        [pre-commit.ci] Add auto fixes from pre-commit.com hooks

        for more information, see https://pre-commit.ci
    autofix_prs: true
    autoupdate_branch: ''
    autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
    autoupdate_schedule: weekly
    skip: [pytest,doctest,mypy]
    submodules: false
